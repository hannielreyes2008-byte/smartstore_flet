name: Build Flet APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flet
        run: pip install flet
      - name: Build APK
        run: echo "y" | flet build apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: build/apk
