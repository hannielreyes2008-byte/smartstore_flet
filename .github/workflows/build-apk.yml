name: Build Flet APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flet
        run: |
          pip install flet
          pip install flet-cli
      - name: Build APK
        run: |
          export FLUTTER_ROOT=/opt/flutter
          flet build apk --yes --flutter-flags "--no-interactive"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartstore-apk
          path: build/apk/*.apk
